name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        # Packaging an unsigned VSIX does not require the native credential or
        # signing helpers pulled in by vsce. Skipping lifecycle scripts keeps
        # the release build reproducible on clean GitHub-hosted runners.
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run tests
        run: pnpm test

      - name: Package extension
        run: pnpm exec vsce package --no-dependencies

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" ./*.vsix --generate-notes --title "${{ github.ref_name }}"
